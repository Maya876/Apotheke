<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <button id="toggleBtn" onclick="toggleSidebar()">☰ Menü</button>

    <div class="sidebar" id="mySidebar">
        <a href="http://127.0.0.1:5500/index.html">Startseite</a></li>
        <a href="http://127.0.0.1:5500/Gallerie/index.html">Gallerie</a></li>
        <a href="http://127.0.0.1:5500/about_me.html">About Me</a></li>
    </div>

    <!-- <model-viewer> HTML element -->
    <model-viewer src="Pilze.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1">
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
  
      <script src="funktionen.js"></script>
  </body>
</html>
