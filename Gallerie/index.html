<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <button id="toggleBtn" onclick="toggleSidebar()">☰ Menü</button>

    <div class="sidebar" id="mySidebar">
        <a href="../Eingang/index.html">Startseite</a></li>
        <a href="./index.html">Gallerie</a></li>
        <a href="../Me/index.html">About Me</a></li>
    </div>





    <a href="../Eingang/index.html" class="back-arrow-link">

        <model-viewer src="back_Pfeil.glb" 
        scale="0.5 0.5 0.5" 
        camera-controls 
        tone-mapping="neutral" 
        poster="poster.webp" 
        shadow-intensity="1" 
        autoplay>
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>
            <button slot="ar-button" id="ar-button">
                View in your space
            </button>
            <div id="ar-prompt">
                <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
            </div>
        </model-viewer>

    </a>
      

    <model-viewer class="model" src="Pilze.glb"    scale="1.5 1.5 1.5"   orientation="0deg 0deg -90deg"  ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" >
        <div class="progress-bar hide" slot="progress-bar">

            
            <div class="update-bar"></div>
        </div>
        <button slot="ar-button" id="ar-button">
            View in your space
        </button>
        <div id="ar-prompt">
            <img src="ar_hand_prompt.png">
        </div>

            <extra-model class="magisch" src="magisch.glb" offset="-3.0 0 0"  orientation="0deg 0deg 30deg">
            </extra-model>

            <extra-model class="magisch" src="Bubble2.glb" offset="3.0 0 0"  orientation="0deg 0deg 30deg">
            </extra-model>

            <extra-model id="bubble" src="Bubble1.1.glb" offset="10.0 2.3 0.9" scale="0.45 0.45 0.45" orientation="0deg 0deg 70deg">
            </extra-model>

            <extra-model id="bubble" src="Bubble3.glb" offset="9.0 -0.1 0" scale="1.5 1.5 1.5" orientation="0deg 0deg 70deg">
            </extra-model>

        </model-viewer> 
    
    
   


    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
  
      <script src="funktionen.js"></script>
  </body>
</html>
