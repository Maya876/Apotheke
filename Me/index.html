<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->

    <button id="toggleBtn" onclick="toggleSidebar()">☰ Menü</button>

    <div class="sidebar" id="mySidebar">
        <a href="../Eingang/index.html">Startseite</a></li>
        <a href="../Gallerie/index.html">Gallerie</a></li>
        <a href="./index.html">About Me</a></li>
    </div>

    <a href="../Eingang/index.html" class="back-arrow-link">

        <model-viewer src="back_Pfeil.glb" 
        scale="0.5 0.5 0.5" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        poster="poster.webp" 
        shadow-intensity="1" 
        autoplay>
            <div class="progress-bar hide" slot="progress-bar">
                <div class="update-bar"></div>
            </div>
            <button slot="ar-button" id="ar-button">
                View in your space
            </button>
            <div id="ar-prompt">
                <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
            </div>
        </model-viewer>

    </a>

    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
  
    <h1 id="title">About Me...</h1>

    <script src="funktionen.js"></script>
  </body>
</html>
